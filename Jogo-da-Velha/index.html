<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jogo da Velha Pro</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Jogo da Velha</h1>
        
        <div class="scoreboard">
            <div class="score-item" id="item-x">
                <span class="score-label">Jogador X</span>
                <span class="score-value" id="score-x">0</span>
            </div>
            <div class="score-item">
                <span class="score-label">Empates</span>
                <span class="score-value" id="score-draws">0</span>
            </div>
            <div class="score-item" id="item-o">
                <span class="score-label">Jogador O</span>
                <span class="score-value" id="score-o">0</span>
            </div>
        </div>

    <div id="status" aria-live="polite">Vez do: X</div>
    <div class="board" id="board" role="grid" aria-label="Tabuleiro do Jogo da Velha"></div>
        
        <div class="controls">
            <select id="sideSelect">
                <option value="X">Sou X</option>
                <option value="O">Sou O</option>
            </select>
            <button id="confirmSide">Jogar</button>
            <button id="suggest" class="secondary">Dica</button>
            <button id="aiToggle" class="secondary">IA: OFF</button>
            <button id="reset">Novo Jogo</button>
            <button id="clearScore" class="danger">Zerar Placar</button>
        </div>
    </div>

    <script src="script.js" defer></script>
</body>
</html>
